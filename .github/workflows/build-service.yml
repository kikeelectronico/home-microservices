name: Build service - Reusable

on:
    workflow_call:
        inputs:
            service:
                required: true
                type: string
            tag:
                required: true
                type: string
        secrets:
            REGISTRY_REPOSITORY:
              required: true
            REGISTRY_URL:
              required: true
            REGISTRY_USERNAME:
              required: true
            REGISTRY_PASSWORD:
              required: true
  
jobs:
  path-filter:
    name: Filter ${{ inputs.service }}
    runs-on: ubuntu-latest
    outputs:
        changed: ${{ steps.filter.outputs.changed }}
    steps:
    - uses: actions/checkout@v7
    - uses: dorny/paths-filter@v4
      id: filter
      with:
        filters: |
            changed:
            - "${{ inputs.service }}/**"

  create-rollback:
    name: Create rollback for ${{ inputs.service }}
    runs-on: ubuntu-latest
    needs: path-filter
    continue-on-error: true
    permissions:
      contents: read
      packages: write
    if: (needs.path-filter.outputs.changed == 'true' || github.event_name == 'workflow_dispatch') && inputs.tag == 'main'
    steps:
      - name: Login to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Tag rollback image
        run: |
          docker buildx imagetools create \ -t ${{ secrets.REGISTRY_URL }}/${{ secrets.REGISTRY_REPOSITORY }}/${{ inputs.service }}:${{ inputs.tag }}-rollback \ ${{ secrets.REGISTRY_URL }}/${{ secrets.REGISTRY_REPOSITORY }}/${{ inputs.service }}:${{ inputs.tag }}
  
  build_and_push:
    name: Build and push ${{ inputs.service }}
    runs-on: ubuntu-latest
    needs: path-filter
    permissions:
      contents: read
      packages: write
    if: needs.path-filter.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to registry
        if: inputs.tag != 'test'
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.service }}
          file: ${{ inputs.service }}/Dockerfile
          platforms: linux/amd64
          push: ${{ inputs.tag != 'test' }}
          tags: ${{ inputs.tag != 'test' && format('{0}/{1}/{2}:{3}', secrets.REGISTRY_URL,secrets.REGISTRY_REPOSITORY, inputs.service, inputs.tag) || format('{0}:{1}', inputs.service, inputs.tag)}}