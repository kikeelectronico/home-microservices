name: Dev pull request

on:
  workflow_dispatch:
  pull_request:
    branches: 
      - dev
jobs:
  build:
    name: Build
    strategy:
      matrix:
        service:
          - bigquery-outbound
          - ble-inbound
          - chromecast-logic-pool
          - circadian-controller
          - data-panel-api
          - data-panel-front
          - decision-engine
          - dns-updater
          - hue-inbound
          - hue-logic-pool
          - hue-outbound
          - hue-sensors-alerts
          - ikea-inbound
          - ikea-outbound
          - logic-pool
          - meteo-inflow
          - timer
          - monitor-heartbeat-control
          - monitor-heartbeat-request
          - monitor-http-request
          - notification-message
          - notification-voice
          - task-scheduler
          - telegram-bot
    uses: ./.github/workflows/build-service.yml
    with:
      service: ${{ matrix.service }}
      tag: test
    secrets:
      REGISTRY_URL: ${{secrets.REGISTRY_URL}}
      REGISTRY_REPOSITORY: ${{secrets.REGISTRY_REPOSITORY}}
      REGISTRY_USERNAME: ${{secrets.REGISTRY_USERNAME}}
      REGISTRY_PASSWORD: ${{secrets.REGISTRY_PASSWORD}}
